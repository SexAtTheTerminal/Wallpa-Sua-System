services:
  db:
    image: postgres:15-alpine
    container_name: walpasua-postgres
    restart: always
    environment:
      - POSTGRES_USER: root
      - POSTGRES_PASSWORD: rootpassword
      - POSTGRES_DB: walpa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data: /var/lib/postgresql/data

  backend:
    image: node:20-alpine
    container_name: walpasua-backend
    working_dir: /usr/src/app
    volumes:
      - ./backend/usr/src/app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://root:rootpassword@db:5432/kanban_db?schema=public
    command: sh -c "npm install && npx prisma generate && sleep 5 && npx prisma migrate dev --name auto_migration && npm run start:dev"
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    container_name: walpasua-frontend
    working_dir: /usr/src/app
    volumes:
      - ./frontend/usr/src/app
    ports:
      - "4200:4200"
    command: sh -c "npm install && npm run start -- --host 0.0.0.0"
    depends_on:
      - backend

  volumes:
    postgres_data:
